<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Store</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="container nav-container">
            <div class="logo">Minimalist Store</div>
            
            <!-- Mobile menu toggle button -->
            <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Toggle navigation menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            
            <ul class="nav-links" id="nav-links">
                <!-- Navigation links will be populated by JavaScript -->
            </ul>
        </div>
    </nav>
    
    <section class="hero">
        <h1>Welcome to Minimalist Store</h1>
        <p>Discover clean, simple, and quality products.</p>
        <a href="products.html" class="btn">Shop Now</a>
    </section>
    
    <section class="featured">
        <h2>Featured Products</h2>
        <div class="product-grid" id="featured-products"></div>
    </section>
    
    <footer>
        <p>© 2025 Minimalist Store. All rights reserved.</p>
    </footer>
    
    <!-- Include JWT decode library first -->
    <script src="https://cdn.jsdelivr.net/npm/jwt-decode@3.1.2/build/jwt-decode.min.js"></script>
    
    <!-- Then include your JavaScript files -->
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
