<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Minimalist Store</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
</head>
<body>
    <nav class="navbar">
        <div class="logo">Minimalist Store</div>
        <ul class="nav-links" id="nav-links">
            <!-- Navigation links will be populated by JavaScript -->
        </ul>
    </nav>
    <section class="cart-section">
        <h2>Your Cart</h2>
        <div class="cart-items" id="cart-items"></div>
        <div class="cart-total" id="cart-total">Total: $0.00</div>
        <a href="checkout.html" class="btn" style="display: block; text-align: right; margin-top: 1rem;">Proceed to Checkout</a>
    </section>
    <footer>
        <p>© 2025 Minimalist Store. All rights reserved.</p>
    </footer>
    <script src="js/cart.js"></script>
    <script src="js/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jwt-decode@3.1.2/lib/jwt-decode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jwt-decode@3.1.2/build/jwt-decode.min.js"></script>

<script src="js/auth.js"></script>

</html>
